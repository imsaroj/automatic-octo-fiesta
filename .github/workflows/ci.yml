name: CI

# Docs-only changes (markdown, docs/, LICENSE) skip CI entirely. Caveat: this
# also skips `docs:check`, so a docs-only PR with a broken doc snippet lands
# unchecked — it will surface on the next code push.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Every public exports subpath must have a docs guide, and the doc code
      # snippets must type-check.
      - name: Docs consistency
        run: pnpm docs:check

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      # Also runs inside `web`'s build script; this named step makes a budget
      # regression visible as its own CI failure rather than a build error.
      - name: Bundle budget
        run: pnpm --filter web size

      # Public-surface validation: the exports map resolves, is publish-valid,
      # type-checks from the outside, and the library compiles standalone.
      - name: Exports map check
        run: pnpm exports:check

      - name: publint
        run: pnpm publint

      - name: Public API type-check
        run: pnpm api:check

      - name: Library build (ESM + d.ts)
        run: pnpm build:lib

  security:
    name: Dependency audit & secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks scans commit history — needs the full history, not a shallow clone.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the build on high/critical advisories in production dependencies.
      - name: Audit production dependencies (high+)
        run: pnpm audit --prod --audit-level high

      # Informational: surface moderate advisories without failing the build.
      - name: Audit production dependencies (moderate, non-blocking)
        run: pnpm audit --prod --audit-level moderate
        continue-on-error: true

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: Playwright smoke E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Runs against the Vite dev server (spawned by playwright.config.ts's
      # webServer) — the MSW mock API only exists in dev builds.
      - name: Run E2E suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
