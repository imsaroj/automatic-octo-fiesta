name: Release

on:
  push:
    branches: [main]

# One release at a time, never cancelled mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the release commit + tag, create the GitHub release
  issues: write # comment on issues resolved by the release
  pull-requests: write # comment on PRs included in the release

jobs:
  release:
    name: Version & publish to npm
    runs-on: ubuntu-latest
    # Skip release commits (belt-and-braces: [skip ci] already prevents this).
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs the full history + tags to compute the next version.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # Writes an .npmrc that authenticates pnpm publish via NODE_AUTH_TOKEN.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library (ESM + d.ts)
        run: pnpm build:lib

      - name: publint
        run: pnpm publint

      # Proves the NPM_TOKEN secret authenticates before attempting a release,
      # and reveals the npm username (must own the package's scope). Reported
      # as an annotation so it's visible without opening logs.
      - name: npm auth check
        run: |
          result=$(npm whoami 2>&1 | tail -1 | tr -cd '[:print:]')
          echo "::notice title=npm auth::whoami -> ${result}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # semantic-release: analyzes conventional commits since the last tag,
      # bumps packages/ui/package.json + CHANGELOG, publishes to npm via
      # `pnpm publish` (pnpm applies the dist-facing publishConfig.exports;
      # `npm publish` would not), pushes the release commit + tag, and
      # creates a GitHub release.
      - name: Release
        # On failure, file a GitHub issue containing the log tail — the
        # reliable way to surface the real error from a failed run.
        run: |
          set -o pipefail
          pnpm exec semantic-release 2>&1 | tee sr.log || {
            tail -c 3000 sr.log | jq -Rs --arg run "$GITHUB_RUN_ID" \
              '{title: ("Release failure in run " + $run), body: ("```\n" + . + "\n```"), labels: ["release-failure"]}' | \
              curl -sf -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" -d @- > /dev/null || true
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NO_COLOR: "1"
          FORCE_COLOR: "0"

      # Self-heal: if the version at HEAD is tagged in git but missing from
      # npm (a previous run published the tag then failed at npm), publish it
      # now. No-op when the registry already has the version.
      - name: Ensure tagged version is on npm
        run: |
          set -o pipefail
          name=$(node -p "require('./packages/ui/package.json').name")
          ver=$(node -p "require('./packages/ui/package.json').version")
          if ! git rev-parse -q --verify "refs/tags/v${ver}" > /dev/null; then
            echo "v${ver} is not a released tag; nothing to do"
          elif npm view "${name}@${ver}" version > /dev/null 2>&1; then
            echo "${name}@${ver} already on npm"
          else
            echo "${name}@${ver} is tagged but missing from npm — publishing"
            pnpm --filter "${name}" publish --access public --no-git-checks 2>&1 | tee pub.log || {
              # A concurrent/just-finished publish is success, not failure
              # (npm view can lag right after a publish).
              if grep -q "cannot publish over the previously published" pub.log; then
                echo "${name}@${ver} was already published — nothing to do"
                exit 0
              fi
              tail -c 3000 pub.log | jq -Rs --arg run "$GITHUB_RUN_ID" \
                '{title: ("npm publish failure in run " + $run), body: ("```\n" + . + "\n```"), labels: ["release-failure"]}' | \
                curl -sf -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" -d @- > /dev/null || true
              exit 1
            }
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NO_COLOR: "1"
          FORCE_COLOR: "0"
